services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_ADDR: :8080
      KNOWN_FACES_DIR: /app/known_faces
    ports:
      - "8080:8080"
    volumes:
      - known_faces:/app/known_faces

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  recognizer:
    profiles:
      - recognizer
    build:
      context: .
      dockerfile: apps/recognizer/Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - known_faces:/app/known_faces
    environment:
      ATTENDANCE_POST_URL: http://backend:8080/attendance
      DISPLAY: ${DISPLAY:-:0}

volumes:
  known_faces:
