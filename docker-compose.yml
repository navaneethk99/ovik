services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_ADDR: :8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  recognizer:
    build:
      context: .
      dockerfile: apps/recognizer/Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      ATTENDANCE_POST_URL: http://backend:8080/attendance
      DISPLAY: ${DISPLAY:-:0}
